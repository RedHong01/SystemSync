name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax
        run: python3 -m py_compile server.py project_packager.py generate_windows_config.py

      - name: JavaScript syntax
        run: node --check static/app.js
